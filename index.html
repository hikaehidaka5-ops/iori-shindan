<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>渡辺伊織の診断士トレーニング</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:#1a1410;--paper:#f5f0e8;--paper2:#ede7d9;
    --accent:#8b2c0a;--accent2:#c4622d;--gold:#c9a84c;
    --correct:#2d6a4f;--wrong:#9b1d1d;--border:#c8b89a;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans JP',sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 31px,rgba(139,44,10,.04) 31px,rgba(139,44,10,.04) 32px);}
  header{background:var(--ink);color:var(--paper);text-align:center;padding:20px 16px 16px;position:relative;}
  header::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--gold),var(--accent));}
  header h1{font-family:'Noto Serif JP',serif;font-size:1.3rem;font-weight:900;letter-spacing:.15em;line-height:1.4;}
  header p{font-size:.72rem;opacity:.6;margin-top:4px;letter-spacing:.1em;}
  .container{max-width:640px;margin:0 auto;padding:16px;}
  #screen-subject{display:block;}#screen-quiz{display:none;}
  .section-label{font-size:.68rem;letter-spacing:.2em;color:var(--accent);font-weight:700;margin-bottom:10px;}
  .subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;}
  .subject-btn{background:var(--paper2);border:1.5px solid var(--border);border-radius:6px;padding:12px 10px;cursor:pointer;transition:all .15s;text-align:left;position:relative;}
  .subject-btn:hover{border-color:var(--accent2);background:#e8dece;}
  .subject-btn.selected{border-color:var(--accent);background:#f0e4d4;box-shadow:inset 0 0 0 1px var(--accent);}
  .subject-btn.selected::after{content:'✓';position:absolute;top:6px;right:8px;color:var(--accent);font-size:.8rem;font-weight:700;}
  .subject-btn .num{font-size:.6rem;color:var(--accent2);font-weight:700;letter-spacing:.1em;display:block;margin-bottom:3px;}
  .subject-btn .name{font-size:.82rem;font-weight:700;line-height:1.35;}
  .btn-all{width:100%;background:transparent;border:1.5px dashed var(--border);border-radius:6px;padding:10px;font-size:.78rem;color:#7a6a58;cursor:pointer;margin-bottom:20px;font-family:inherit;transition:all .15s;}
  .btn-all:hover{border-color:var(--accent2);color:var(--accent);}
  .start-btn{width:100%;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:16px;font-size:1rem;font-family:'Noto Serif JP',serif;font-weight:700;letter-spacing:.15em;cursor:pointer;transition:all .15s;box-shadow:0 4px 12px rgba(139,44,10,.25);}
  .start-btn:hover{background:#6e2208;transform:translateY(-1px);}
  .start-btn:disabled{background:#bbb;box-shadow:none;transform:none;cursor:not-allowed;}
  .quiz-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .back-btn{background:transparent;border:1.5px solid var(--border);border-radius:5px;padding:6px 10px;font-size:.75rem;cursor:pointer;color:var(--ink);font-family:inherit;transition:all .15s;white-space:nowrap;}
  .back-btn:hover{border-color:var(--accent);color:var(--accent);}
  .progress-bar{flex:1;height:6px;background:var(--paper2);border-radius:3px;overflow:hidden;border:1px solid var(--border);}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .4s ease;}
  .score-badge{font-size:.75rem;font-weight:700;color:var(--gold);white-space:nowrap;font-family:'Noto Serif JP',serif;}
  .subject-tag{display:inline-block;font-size:.62rem;letter-spacing:.12em;font-weight:700;color:var(--accent2);background:rgba(139,44,10,.07);border:1px solid rgba(139,44,10,.2);border-radius:3px;padding:2px 7px;margin-bottom:10px;}
  .question-card{background:#fff;border:1.5px solid var(--border);border-radius:8px;padding:20px 18px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);min-height:120px;animation:fadeIn .3s ease;}
  .q-number{font-size:.65rem;letter-spacing:.15em;color:#999;margin-bottom:10px;font-weight:500;}
  .q-text{font-size:.93rem;line-height:1.75;font-weight:500;}
  .answer-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
  .ans-btn{padding:16px;border-radius:8px;border:2px solid var(--border);background:var(--paper2);font-size:1.6rem;cursor:pointer;transition:all .15s;font-family:'Noto Serif JP',serif;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .ans-btn span{font-size:.68rem;color:#888;font-family:inherit;font-weight:700;letter-spacing:.1em;}
  .ans-btn:hover:not(:disabled){border-color:var(--accent2);background:#e8dece;transform:translateY(-1px);}
  .ans-btn:disabled{cursor:default;}
  .ans-btn.correct{background:#d4edda;border-color:var(--correct);color:var(--correct);}
  .ans-btn.wrong{background:#f8d7da;border-color:var(--wrong);color:var(--wrong);}
  .ans-btn.reveal{background:#d4edda;border-color:var(--correct);color:var(--correct);opacity:.7;}
  .explanation-box{background:#fff;border-left:3px solid var(--gold);border-radius:0 6px 6px 0;padding:14px 16px;margin-bottom:16px;display:none;animation:fadeIn .3s ease;}
  .explanation-box.show{display:block;}
  .ex-label{font-size:.65rem;letter-spacing:.15em;color:var(--gold);font-weight:700;margin-bottom:6px;}
  .ex-result{font-size:1rem;font-weight:700;margin-bottom:8px;}
  .ex-result.ok{color:var(--correct);}.ex-result.ng{color:var(--wrong);}
  .ex-text{font-size:.82rem;line-height:1.8;color:#3a3028;}
  .next-btn{width:100%;background:var(--ink);color:var(--paper);border:none;border-radius:6px;padding:14px;font-size:.9rem;font-family:'Noto Serif JP',serif;font-weight:700;letter-spacing:.1em;cursor:pointer;display:none;transition:all .15s;}
  .next-btn.show{display:block;}
  .next-btn:hover{background:#2d2520;}
  .stats-row{display:flex;gap:8px;margin-bottom:16px;}
  .stat-chip{flex:1;background:var(--paper2);border:1px solid var(--border);border-radius:6px;padding:8px;text-align:center;}
  .stat-chip .sv{font-size:1.1rem;font-weight:700;font-family:'Noto Serif JP',serif;}
  .stat-chip .sl{font-size:.6rem;color:#888;margin-top:1px;}
  .stat-chip.ok .sv{color:var(--correct);}.stat-chip.ng .sv{color:var(--wrong);}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<header>
  <h1>渡辺伊織の<br>診断士トレーニング</h1>
  <p>全7科目 280問収録 • ○×即採点 • 解説付き</p>
</header>
<div class="container">
  <div id="screen-subject">
    <br>
    <div class="section-label">科目を選択してください（複数可）</div>
    <div class="subject-grid">
      <button class="subject-btn" data-subject="企業経営理論"><span class="num">科目①</span><span class="name">企業経営理論</span></button>
      <button class="subject-btn" data-subject="経営法務"><span class="num">科目②</span><span class="name">経営法務</span></button>
      <button class="subject-btn" data-subject="財務・会計"><span class="num">科目③</span><span class="name">財務・会計</span></button>
      <button class="subject-btn" data-subject="運営管理"><span class="num">科目④</span><span class="name">運営管理</span></button>
      <button class="subject-btn" data-subject="中小企業経営・政策"><span class="num">科目⑤</span><span class="name">中小企業経営・政策</span></button>
      <button class="subject-btn" data-subject="経営情報システム"><span class="num">科目⑥</span><span class="name">経営情報システム</span></button>
      <button class="subject-btn" data-subject="経済学・経済政策"><span class="num">科目⑦</span><span class="name">経済学・経済政策</span></button>
    </div>
    <button class="btn-all" id="btn-all">▶ すべての科目を選択</button>
    <button class="start-btn" id="start-btn" disabled>問題を開始する →</button>
  </div>
  <div id="screen-quiz">
    <br>
    <div class="quiz-header">
      <button class="back-btn" id="back-btn">← 科目選択</button>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="score-badge" id="score-badge">0 / 0</div>
    </div>
    <div class="stats-row">
      <div class="stat-chip ok"><div class="sv" id="stat-correct">0</div><div class="sl">正解</div></div>
      <div class="stat-chip ng"><div class="sv" id="stat-wrong">0</div><div class="sl">不正解</div></div>
      <div class="stat-chip"><div class="sv" id="stat-rate">―</div><div class="sl">正答率</div></div>
    </div>
    <div class="question-card" id="question-card">
      <div class="q-number" id="q-number"></div>
      <div class="subject-tag" id="q-subject"></div>
      <div class="q-text" id="q-text"></div>
    </div>
    <div class="answer-row">
      <button class="ans-btn" id="btn-true" onclick="answer(true)">○<span>正しい</span></button>
      <button class="ans-btn" id="btn-false" onclick="answer(false)">×<span>誤り</span></button>
    </div>
    <div class="explanation-box" id="explanation-box">
      <div class="ex-label">▍ 解　説</div>
      <div class="ex-result" id="ex-result"></div>
      <div class="ex-text" id="ex-text"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()">次の問題へ →</button>
  </div>
</div>
<script>
const Q={
"企業経営理論":[
{q:"PM理論において、P機能（目標達成機能）とM機能（集団維持機能）がともに高いリーダーをPM型と呼び、最も望ましいリーダーシップスタイルとされている。",a:true,e:"PM理論（三隅二不二）では4タイプに分類。PM型は両機能が高く最も効果的。pm型（両方低）が最も望ましくないとされます。"},
{q:"SL理論では、部下の成熟度が低い場合には、委任型（Delegating）のリーダーシップが最も効果的とされている。",a:false,e:"部下の成熟度が低い段階では「教示型（Telling）」が有効。委任型は成熟度が最も高い部下に有効。成熟度に応じて教示→説得→参加→委任と移行します。"},
{q:"フィードラーのコンティンジェンシー理論では、状況が非常に好ましい場合と非常に好ましくない場合の両方において、課題志向型リーダーが効果的とされている。",a:true,e:"フィードラーはLPC尺度でスタイルを測定。状況が非常に好ましい・非常に悪い場合は課題志向型、中程度の状況では人間関係志向型が有効です。"},
{q:"変革型リーダーシップ（バーンズ）は、部下に報酬と引き換えに特定の行動を求める「取引型リーダーシップ」と同義である。",a:false,e:"バーンズは「変革型」と「取引型（交流型）」を対概念として提示。変革型は部下の価値観・動機に働きかけるもので取引型とは明確に区別されます。"},
{q:"バスはバーンズの変革型リーダーシップを発展させ、カリスマ性・鼓舞的動機づけ・知的刺激・個別的配慮の4要素を提唱した。",a:true,e:"バス（Bass）はバーンズの理論を組織場面に応用。①カリスマ性②鼓舞的動機づけ③知的刺激④個別的配慮の4要素を挙げています。"},
{q:"ポーターの競争戦略において、差別化戦略とは業界全体を対象に低コストを実現することで競争優位を獲得する戦略である。",a:false,e:"低コスト×業界全体は「コストリーダーシップ戦略」。差別化戦略は製品・サービスの独自性を高めて割増価格を実現する戦略です。"},
{q:"SWOT分析では、強み（S）と機会（O）を掛け合わせた「SO戦略」が積極的攻勢戦略に相当する。",a:true,e:"SWOT×クロス分析：S×O＝積極攻勢、S×T＝差別化、W×O＝段階的施策、W×T＝防衛・撤退。SOが最も積極的な成長戦略です。"},
{q:"PPMにおいて、市場成長率が高く相対的市場シェアも高い事業は「負け犬」に分類される。",a:false,e:"成長率高×シェア高＝「花形（Star）」。「負け犬（Dog）」は成長率低×シェア低。「問題児→花形→金のなる木→負け犬」の流れで覚えましょう。"},
{q:"アンゾフの成長ベクトルにおいて、既存製品を新規市場に投入する戦略は「市場開発戦略」と呼ばれる。",a:true,e:"既存製品×新規市場＝市場開発、新規製品×既存市場＝製品開発、両方新規＝多角化、両方既存＝市場浸透の4戦略です。"},
{q:"マズローの欲求階層説では、5段階あり、低次の欲求が満たされると次の段階の欲求が動機づけになるとされる。",a:true,e:"生理→安全→所属→承認→自己実現の5段階。下位4つは「欠乏欲求」、最上位の自己実現は「成長欲求」と呼ばれます。"},
{q:"ハーズバーグの2要因理論では、給与や職場環境などの「衛生要因」を改善すると積極的な動機づけにつながる。",a:false,e:"衛生要因（給与・監督・環境）は不足すると不満を生じますが、充足しても積極的動機づけにはなりません。動機づけ要因（達成感・承認・仕事そのもの）が満足をもたらします。"},
{q:"バーナードの組織成立の3要素とは、共通目的・協働意志・コミュニケーションである。",a:true,e:"バーナードの3条件：①共通目的②協働意志（貢献意欲）③コミュニケーション（情報伝達）。試験頻出事項です。"},
{q:"コア・コンピタンスとは、競合他社に模倣されやすく複数の事業領域に応用できる企業の中核的能力を指す。",a:false,e:"コア・コンピタンス（プラハラード＆ハメル）の条件は①顧客価値の提供②模倣困難性③複数事業への展開可能性。「模倣されやすい」は誤りです。"},
{q:"パス・ゴール理論（ハウス）では、部下の特性や環境の特性によって有効なリーダーシップスタイルが変わるとされている。",a:true,e:"ハウスのパス・ゴール理論は指示型・支援型・参加型・達成志向型の4スタイルを部下の特性と環境特性の2つの状況変数に応じて使い分けます。"},
{q:"機能別組織のデメリットは、事業部間の調整コストが高くなることである。",a:false,e:"事業部間調整コスト高は「事業部制組織」の特徴。機能別組織のデメリットは「部門間の調整困難」「全体最適より部門最適」「環境変化への対応が遅い」などです。"},
{q:"アベルのドメイン定義は「顧客グループ・顧客機能・代替技術」の3次元で事業領域を定義する。",a:true,e:"アベルの3次元：①顧客グループ（誰に）②顧客機能（何を）③代替技術（どのように）。ドメインの適切な設定が戦略の出発点となります。"},
{q:"経験曲線効果とは、累積生産量が増加するにつれて単位あたりのコストが一定割合で低下する現象をいう。",a:true,e:"経験曲線（BCGが体系化）：累積生産量が2倍になるごとに単位コストが20〜30%低下。規模の経済・学習効果・技術改善が要因。PPMの理論的根拠の一つです。"},
{q:"マーケティング・ミックスの4Pとは、Product・Price・Place・Promotionである。",a:true,e:"マッカーシーが提唱した4P。顧客視点の4C（Customer value・Cost・Convenience・Communication）も重要。4Pは売り手視点、4Cは買い手視点と整理しましょう。"},
{q:"製品ライフサイクルの成熟期では、競合が少なく市場が急速に拡大するため積極的な市場開拓投資が最重要戦略とされる。",a:false,e:"設問は「導入期〜成長期」の特徴。成熟期は市場最大・成長鈍化・競合多・価格競争激化。成熟期の戦略は差別化・コスト削減・リポジショニングなどです。"},
{q:"シングルループ学習とは、既存の行動基準や価値観を見直すことなく、エラーを検出・修正する学習を指す。",a:true,e:"アージリス＆ショーン：シングルループ（前提変えずにエラー修正）vs ダブルループ（根本的な価値観・前提を見直す）。環境変化への適応にはダブルループが重要。"},
{q:"ポーターの「5つの競争要因（ファイブフォース）」には、新規参入の脅威・代替品の脅威・買い手の交渉力・売り手の交渉力・既存業者間の競争の5つが含まれる。",a:true,e:"ポーターの5フォース分析は業界の収益性を決定する構造的要因を分析するフレームワーク。5つの力が強いほど業界の収益性は低くなります。"},
{q:"プロダクト・ライフサイクル理論において、導入期は製品が市場に投入された直後であり、売上高が急激に拡大する段階である。",a:false,e:"売上高が急激に拡大するのは「成長期」。導入期は売上が緩やかで認知度が低く、先行投資で赤字になることが多い段階です。"},
{q:"マーケティングにおける「STP分析」とは、セグメンテーション（市場細分化）・ターゲティング（標的市場の選定）・ポジショニング（自社の位置付け）の3つのプロセスを指す。",a:true,e:"STP分析はマーケティング戦略の基本フレームワーク。Segmentation（市場を同質なニーズごとに細分化）→Targeting（ターゲットを絞る）→Positioning（競合との差別化軸を決める）の順で進めます。"},
{q:"ブランド・エクイティとは、ブランドに蓄積された資産価値のことであり、ブランド認知・知覚品質・ブランド連想・ブランドロイヤルティなどの要素から構成される。",a:true,e:"ブランド・エクイティ（アーカー）の4要素：①ブランド認知（知っているか）②知覚品質（品質イメージ）③ブランド連想（イメージの連想）④ブランドロイヤルティ（繰り返し購買）。"},
{q:"デシとライアンの自己決定理論では、外発的動機づけは常に内発的動機づけを阻害するため、報酬制度は一切使うべきでないとされる。",a:false,e:"外発的動機づけが常に内発的動機づけを阻害するという「アンダーマイニング効果」は条件付き報酬（タスク・コンティンジェント）の場合。情報提供的フィードバックや自律性支援的報酬は内発的動機づけを高めます。"},
{q:"コングロマリット型多角化とは、既存事業と技術・市場の両面で関連性のない事業に進出する多角化戦略である。",a:true,e:"多角化の類型：関連多角化（技術か市場に関連）vs 非関連多角化（コングロマリット型）。コングロマリット型は事業ポートフォリオの分散リスクを狙いますが、シナジー効果が得にくいデメリットがあります。"},
{q:"マトリックス組織とは、機能別組織とプロジェクト別組織を重ね合わせた構造で、一人の従業員が複数の上司を持つことになる。",a:true,e:"マトリックス組織は機能別と製品別（プロジェクト別）の指揮命令系統が交差する組織形態。柔軟性と専門性を両立できる一方、指揮命令の一元化原則に反するため権限の混乱が生じやすいデメリットがあります。"},
{q:"ポーターのバリューチェーン（価値連鎖）において、調達・製造・物流・販売・サービスは「主活動」に分類される。",a:true,e:"バリューチェーン（ポーター）の主活動：購買物流・製造・出荷物流・マーケティング・販売・サービス。支援活動：全般管理・人事・技術開発・調達。支援活動の「調達」と主活動の「購買物流」を混同しないよう注意。"},
{q:"プロスペクト理論（カーネマン＆トベルスキー）では、人は同額の利益よりも損失を約2倍大きく感じる傾向があるとされる。",a:true,e:"プロスペクト理論は行動経済学の基礎理論。損失回避性（損失の痛みは利益の喜びの約2倍）が意思決定に影響します。フレーミング効果（同じ内容でも表現の仕方で選好が変わる）も重要概念です。"},
{q:"ポジショニング戦略において、「知覚マップ（パーセプチュアルマップ）」は消費者が製品をどのように認知しているかを2次元の図で表したものである。",a:true,e:"知覚マップは消費者の頭の中での製品の位置付けを2軸で可視化する手法。自社製品と競合製品の相対的な位置関係を把握し、差別化ポイントや未開拓ポジションを発見するために使います。"},
{q:"組織の「コンフリクト（葛藤・対立）」は常に組織に悪影響を与えるため、マネジメントは発生を完全に防止すべきである。",a:false,e:"コンフリクトには機能的コンフリクト（創造性・問題発見を促す建設的な対立）と逆機能的コンフリクト（破壊的な対立）があります。適度な機能的コンフリクトは組織の活性化に寄与します。"},
{q:"ティール組織とは、フレデリック・ラルーが提唱した組織モデルで、階層的な管理なしに自律分散型で機能する組織形態を指す。",a:true,e:"ラルーの『ティール組織』では組織の進化段階を色で表現。ティール（青緑）は最も進化した段階で、セルフマネジメント・ホールネス（全体性）・進化する目的の3つの特徴を持ちます。"},
{q:"RFM分析とは、顧客の購買行動を「最新購買日（Recency）・購買頻度（Frequency）・購買金額（Monetary）」の3指標で評価する顧客分析手法である。",a:true,e:"RFM分析はCRM（顧客関係管理）で用いる顧客セグメンテーション手法。3指標でスコアリングして優良顧客・離反顧客などを特定し、適切なアプローチを使い分けます。"},
{q:"製品の普及率がS字カーブを描くという「イノベーター理論（ロジャーズ）」では、アーリーマジョリティは全採用者の約34%を占める。",a:true,e:"ロジャーズの採用者分類：イノベーター2.5%・アーリーアダプター13.5%・アーリーマジョリティ34%・レイトマジョリティ34%・ラガード16%。アーリーアダプターを「オピニオンリーダー」として取り込むことが普及のカギです。"},
{q:"ライン組織とは、意思決定権限が上位から下位へ一本の命令系統で流れる組織であり、「命令一元化の原則」が守られている。",a:true,e:"ライン組織（純粋ライン型）は指揮命令が一元化され責任が明確な一方、大規模化すると管理者の負担が過大になります。これを補うためスタッフ（参謀機能）を加えたライン＆スタッフ組織が発展しました。"},
{q:"BCGのPPMにおいて、「金のなる木（Cash Cow）」に位置する事業には積極的に投資して市場シェアを拡大させる戦略をとるべきである。",a:false,e:"「金のなる木」は市場成長率低×シェア高の事業。成長が見込めない成熟市場なので積極投資より「収穫（Harvest）」が基本戦略です。得られたキャッシュを「花形」や「問題児」に投資します。"},
{q:"ドラッカーは「企業の目的は利潤の最大化である」と主張した。",a:false,e:"ドラッカーは「企業の目的は顧客の創造である」と主張。利潤は目的ではなく、企業が存続するための条件（制約条件）に過ぎないとしました。MBO（目標管理制度）の提唱でも有名です。"},
{q:"マーケティングにおける「プッシュ戦略」とは、広告・PR等で最終消費者に直接働きかけて需要を喚起する戦略である。",a:false,e:"説明は「プル戦略」。プッシュ戦略は販売員の活動・流通業者へのインセンティブ提供などで流通チャネルを通じて製品を押し込む戦略です。プッシュは「押す（流通経路へ）」、プルは「引く（消費者が要求）」と覚えましょう。"},
{q:"企業戦略における「選択と集中」とは、多角化した事業ポートフォリオの中から競争優位のある事業に経営資源を集中させることを意味する。",a:true,e:"1990年代以降、非関連多角化の問題（コングロマリット・ディスカウント等）が認識され、コア事業への「選択と集中」が経営トレンドになりました。GEのウェルチCEOの事業再編が有名な事例です。"},
{q:"マーケティングの「プロダクト・コンセプト」とは、製品の品質・性能・機能を高めることで顧客を引きつけようとする経営哲学である。",a:true,e:"コトラーのマーケティング・マネジメント概念の変遷：生産コンセプト（大量生産・低価格）→製品コンセプト（高品質追求）→販売コンセプト（積極的販売）→マーケティングコンセプト（顧客ニーズ起点）→社会的マーケティングコンセプト（社会的責任）。"}
],
"経営法務":[
{q:"株式会社を設立するには、発起設立・募集設立のいずれの場合も公証人による定款の認証が必要である。",a:true,e:"株式会社の設立には公証人による定款認証が必要（合同会社は不要）。発起設立は発起人のみが出資、募集設立は発起人以外からも出資を募る方法です。"},
{q:"取締役会設置会社において、代表取締役は株主総会の決議によって選定される。",a:false,e:"代表取締役は取締役会の決議で取締役の中から選定されます。株主総会が選任するのは「取締役」で、その中から取締役会が代表取締役を選定します。"},
{q:"株主は会社の債権者に対して、自己の出資額を超えて責任を負うことはない。これを有限責任という。",a:true,e:"株主有限責任の原則（会社法104条）。株主は出資金額の範囲内でしか責任を負いません。合名会社社員は無限責任を負う点と対比して覚えましょう。"},
{q:"会社法上、株式会社の最低資本金は1,000万円とされている。",a:false,e:"2006年の会社法施行により最低資本金制度は廃止。現在は資本金1円からでも株式会社を設立できます（実務上は登記費用等が必要）。"},
{q:"監査役は取締役会での議決権を有しない。",a:true,e:"監査役は取締役の職務執行を監査する機関（会社法381条）。取締役会に出席して意見を述べることはできますが、議決権はありません。監査役と取締役の兼任も禁止。"},
{q:"特許権の存続期間は、特許出願日から20年である。",a:true,e:"特許法67条：特許権の存続期間は出願日から20年。実用新案10年、意匠25年（2020年改正）、商標10年（更新可能）と比較して覚えましょう。"},
{q:"著作権は、著作物を創作した時点で自動的に発生し、登録などの手続きは権利発生の要件ではない。",a:true,e:"著作権は「無方式主義」（創作と同時に権利発生）。特許・実用新案・意匠・商標は登録が権利発生要件（方式主義）である点と対比して覚えましょう。"},
{q:"商標権の存続期間は設定登録日から10年であるが、更新登録申請により何度でも更新できる。",a:true,e:"商標権の存続期間は10年（商標法19条）。更新登録申請により10年ずつ何度でも延長可能。商標はブランドとして長期使用を想定しているためです。"},
{q:"合同会社は、全ての社員が有限責任を負い、出資比率に関わらず定款で利益配分を自由に決定できる。",a:true,e:"合同会社（LLC）の特徴：①全社員有限責任②内部自治（定款自治）が広く認められる③株主総会・取締役会が不要。スタートアップや共同事業に適しています。"},
{q:"不正競争防止法において、著名な商品表示と同一または類似の表示を使用することは、混同が生じなくても不正競争行為となる。",a:true,e:"不競法2条1項2号は「著名表示」への「希釈化（ダイリューション）」を規制。混同のおそれなしに不正競争行為に該当します（1号の誤認惹起は混同のおそれが要件）。"},
{q:"変態設立事項（現物出資・財産引受・発起人報酬等）は定款に記載しなければ効力が生じない。",a:true,e:"変態設立事項は相対的記載事項の代表例。定款記載＋原則として検査役の調査が必要。設立手続きの重要な規制事項です。"},
{q:"非公開会社では定款で取締役任期を10年まで伸長できる。",a:true,e:"会社法332条：公開会社の取締役任期は原則2年。非公開会社（全株式に譲渡制限）は定款により最大10年まで伸長可能。"},
{q:"実用新案権は無審査登録制度を採用しており、出願すれば実体審査なしに登録される。",a:true,e:"実用新案は無審査登録制度（方式審査のみ）。登録は早いが、権利行使には「実用新案技術評価書」の提示が必要。存続期間は出願から10年。"},
{q:"株主総会の特別決議は、議決権の過半数を有する株主が出席し、出席した株主の議決権の過半数の賛成で成立する。",a:false,e:"特別決議（会社法309条2項）は、議決権過半数の株主が出席し、出席した株主の議決権の3分の2以上の賛成が必要。過半数賛成で成立するのは「普通決議」です。"},
{q:"持株比率が過半数でなくても、実質的な支配があれば会社法上の親会社となりえる。",a:true,e:"親子関係は「支配」概念で判断。役員の過半数派遣など実質的支配があれば子会社とみなされます（会社法2条3・4号）。"},
{q:"2019年の意匠法改正により、店舗等の内装デザインが保護対象に追加された。",a:true,e:"2019年意匠法改正で、内装意匠・建築物外観・画像（GUI）なども保護対象に拡大。存続期間は出願日から25年（改正で延長）。"},
{q:"社外取締役は、当該会社または子会社の業務執行取締役等でないことが要件の一つである。",a:true,e:"社外取締役の要件（会社法2条15号）：①業務執行取締役等でない②就任前10年間もその地位になかった③親会社・兄弟会社の業務執行者でない④取締役等の近親者でない等。"},
{q:"営業秘密の3要件は、秘密管理性・有用性・非公知性である。",a:true,e:"不正競争防止法の「営業秘密」：①秘密管理性（秘密として管理）②有用性（事業活動に有用）③非公知性（公然と知られていない）の3つすべてを満たす必要があります。"},
{q:"一定条件を満たす会社では、定款の定めにより取締役会決議で剰余金の配当を行うことができる。",a:true,e:"会社法459条：会計監査人設置・監査役会設置等の要件を満たす会社では、定款規定により取締役会決議で配当可能。機動的な配当政策が実現します。"},
{q:"合名会社の社員は、会社の債務について無限連帯責任を負う。",a:true,e:"合名会社は社員全員が無限責任社員で構成（会社法576条）。会社財産で弁済できない部分について個人財産でも責任を負います。合資会社は無限責任＋有限責任社員の混合。"},
{q:"株式の「種類株式」とは、普通株式と異なる権利内容を持つ株式であり、議決権制限株式・優先株式・譲渡制限株式などが含まれる。",a:true,e:"会社法108条の種類株式：①剰余金・残余財産の分配優先②議決権制限③譲渡制限④取得請求権⑤取得条項⑥全部取得条項⑦拒否権（黄金株）⑧役員選任権の8種類。ベンチャー投資やM&A防衛策として利用されます。"},
{q:"会社法上の「公開会社」とは、上場している会社を指す。",a:false,e:"会社法上の「公開会社」とは、すべての株式に譲渡制限がない（一部でも譲渡自由な）会社を指します。必ずしも上場会社を意味しません。「非公開会社」は全株式に譲渡制限がある会社（閉鎖型会社）です。"},
{q:"著作権の保護期間は、著作者の死後70年である（原則として）。",a:true,e:"2018年の著作権法改正により、著作権の保護期間が死後50年から死後70年に延長されました（TPP関連）。法人著作の場合は公表後70年（創作後70年）が原則です。"},
{q:"特許出願から特許査定までの審査請求は、出願日から3年以内に行う必要がある。",a:true,e:"特許法48条の3：出願審査請求の期限は出願日から3年以内。期限内に審査請求がない場合は出願が取り下げとみなされます。出願公開は出願から1年6ヶ月後に行われます。"},
{q:"会社の役員が職務執行に際して第三者に損害を与えた場合、その役員が悪意または重大な過失があれば、第三者は役員に対して直接損害賠償を請求できる。",a:true,e:"会社法429条（役員の第三者に対する責任）：役員が職務において悪意・重過失があった場合、第三者は直接役員に損害賠償請求できます。会社が無資力の場合でも役員個人から回収できる重要な規定です。"},
{q:"株式会社は、定款に定めることにより株式の譲渡に取締役会の承認を必要とすることができる。",a:true,e:"譲渡制限株式（会社法107条）：定款で定めることにより、株式の譲渡に会社（取締役会等）の承認を要する旨を設けることができます。閉鎖的な株主構成を維持したい非公開会社で多く利用されます。"},
{q:"景品表示法上の「優良誤認表示」とは、実際よりも著しく優良であると一般消費者に誤認させる表示であり、サービスの内容に関しては適用されない。",a:false,e:"景品表示法の優良誤認表示は商品・サービス両方に適用されます。商品・サービスの品質・規格・その他内容についての著しく優良な誤認表示が対象。「有利誤認表示」（価格・取引条件の誤認）も合わせて覚えましょう。"},
{q:"民法上の「時効」には取得時効と消滅時効があり、債権の消滅時効期間は原則として権利を行使できることを知った時から5年（または権利行使できる時から10年）である。",a:true,e:"2020年民法改正で消滅時効の期間が整理されました。主観的起算点（知った時）から5年・客観的起算点（行使できる時）から10年。どちらか短い方で時効となります（改正前は原則10年）。"},
{q:"株式会社の設立において、「変態設立事項」は定款に記載するだけで自動的に効力が生じる。",a:false,e:"変態設立事項（現物出資・財産引受・発起人報酬・設立費用）は定款記載に加え、原則として裁判所が選任した検査役の調査が必要です（会社法33条）。発起人全員の同意だけでは効力が生じません。"},
{q:"フランチャイズ契約は、独占禁止法の観点から、本部（フランチャイザー）が加盟店（フランチャイジー）の販売価格を拘束することは、原則として不公正な取引方法に該当する。",a:true,e:"再販売価格の拘束（独禁法2条9項4号）：メーカー・本部が流通業者・加盟店の販売価格を拘束することは、原則として不公正な取引方法（独禁法違反）に該当します。オープン価格制度普及の背景の一つです。"},
{q:"独占禁止法上の「カルテル」とは、競争関係にある複数の事業者が価格・生産数量・取引先等について協定を結び競争を制限することをいい、原則として禁止されている。",a:true,e:"カルテル（不当な取引制限：独禁法3条）は市場競争を歪める違法行為。違反した場合は課徴金（対象商品・役務の売上額の一定割合）が課されます。公正取引委員会が摘発・審査します。"},
{q:"会社法において、株式会社の取締役の員数は、取締役会設置会社では最低3名が必要である。",a:true,e:"会社法331条：取締役会設置会社では取締役を3名以上置く必要があります。取締役会非設置会社では1名以上でOK。監査役会設置会社は監査役3名以上（社外監査役半数以上）が必要です。"},
{q:"「合弁会社（ジョイント・ベンチャー）」とは、複数の企業が出資して共同で設立・運営する新会社であり、リスクや資源の共有が目的の一つである。",a:true,e:"合弁会社（JV）は新市場参入・技術共有・リスク分散を目的に複数企業が出資して設立する事業体。親会社間の利害対立による意思決定の遅れ・秘密情報の漏洩リスクなどがデメリットとして挙げられます。"},
{q:"著作権法では、他人の著作物を引用して利用することは、正当な範囲内で適切に行われる限り著作権者の許諾なしに行うことができる。",a:true,e:"引用（著作権法32条）：①引用の目的が正当②報道・批評・研究等の目的③引用部分が明瞭に区別できる④自分の著作物が主・引用が従（主従関係）⑤出所を明示する、などの要件を満たす場合に許諾不要で引用できます。"},
{q:"親事業者は、下請事業者に対して自己の指定する物（役務）を強制的に購入させることは、下請法上の禁止行為に該当する。",a:true,e:"下請法11条（購入・利用強制の禁止）：親事業者が正当な理由なく、下請事業者に自己や自己の指定する者から物・役務を強制購入させることは禁止。下請事業者の不利益になる行為を規制しています。"},
{q:"「労働基準法」において、使用者は労働者に対して1週間に少なくとも1日の休日（法定休日）を与えなければならない。",a:true,e:"労働基準法35条：毎週少なくとも1日（4週4日でも可）の法定休日を与える義務があります。法定休日の労働（休日労働）には35%以上の割増賃金支払いが必要です。"},
{q:"会社法上、株主は株主総会において、持株数に関係なく一人一票の議決権を持つ。",a:false,e:"株式会社では原則として「1株1議決権（株主平等の原則）」です。つまり持株数が多いほど議決権も多くなります。例外として議決権制限株式（種類株式）の発行により議決権のない株式を作ることもできます。"},
{q:"民法の「連帯保証」では、債権者は主債務者に先に請求・強制執行してからでなければ、保証人に請求することができない。",a:false,e:"連帯保証人には「催告の抗弁権」「検索の抗弁権」がありません（民法454条）。債権者は主債務者に先に請求しなくとも直接連帯保証人に請求できます。通常の保証と連帯保証の違いは試験頻出。"},
{q:"会社が自己株式を取得した場合、取得した自己株式には議決権が認められる。",a:false,e:"会社法308条2項：自己株式には議決権がありません（議決権の休止）。自己株式は貸借対照表の純資産の部に「自己株式（マイナス）」として計上されます。"}
],
"財務・会計":[
{q:"貸借対照表において、資産の部の合計は負債の部と純資産の部の合計と必ず一致する。",a:true,e:"貸借対照表の基本等式「資産＝負債＋純資産」。この恒等式からBalance Sheetとも呼ばれます。資産は資金の「運用形態」、負債・純資産は「調達源泉」を示します。"},
{q:"損益計算書において、売上高から売上原価を差し引いた利益を「営業利益」という。",a:false,e:"売上高－売上原価＝「売上総利益（粗利益）」。営業利益は売上総利益から販管費を差し引いたものです。5段階の利益（売上総→営業→経常→税引前→当期純）を覚えましょう。"},
{q:"流動比率は「流動資産÷流動負債×100」で計算され、一般的に200%以上が望ましいとされる。",a:true,e:"流動比率は短期支払能力の指標。流動資産÷流動負債×100で算出。一般的に200%以上が安全とされますが、業種によって適正水準は異なります。"},
{q:"定額法では毎年同じ金額を費用計上し、定率法では毎年同じ割合を帳簿価額に乗じて費用を計算する。",a:true,e:"定額法＝（取得原価－残存価額）÷耐用年数で均等償却。定率法＝期首帳簿価額×定率で計算し初期ほど費用大。定率法は早期費用化で節税効果が高い。"},
{q:"キャッシュフロー計算書において、営業活動によるキャッシュフローが正であれば、企業は健全な状態にあると断定できる。",a:false,e:"営業CFプラスは本業でキャッシュを生み出している好ましい状態ですが、投資CF・財務CFも含めて総合的に判断する必要があります。単一指標で健全と断定はできません。"},
{q:"ROE（自己資本利益率）は「当期純利益÷自己資本×100」で計算される株主視点の収益性指標である。",a:true,e:"ROEはデュポン分析でROE＝売上高純利益率×総資産回転率×財務レバレッジに分解でき、収益性・効率性・財務戦略の3側面から分析できます。"},
{q:"日本の会計基準では、のれんは20年以内に均等償却する必要がある。",a:true,e:"日本基準：のれんは20年以内の規則的償却が必要。IFRS（国際会計基準）ではのれんの規則的償却なしで毎年減損テスト。この違いが日本企業のIFRS採用のハードルになっています。"},
{q:"損益分岐点売上高は「固定費÷変動費率」で計算される。",a:false,e:"損益分岐点売上高＝固定費÷（1－変動費率）＝固定費÷限界利益率。変動費率ではなく「限界利益率（貢献利益率）」で割ります。診断士試験の頻出計算問題です。"},
{q:"売上債権回転率が高いほど、売上債権の回収が効率的に行われていることを示す。",a:true,e:"売上債権回転率＝売上高÷売上債権。回転率が高いほど短期間で回収できています。逆に低い場合は回収遅延・不良債権の懸念。回転期間（365日÷回転率）で日数換算もできます。"},
{q:"物価上昇時に後入先出法（LIFO）を採用すると、先入先出法（FIFO）より売上原価が小さくなる。",a:false,e:"物価上昇時はLIFOで高い価格のものが先に払い出され売上原価が大きくなります（利益が小さくなる）。FIFOでは売上原価が小さくなります。なお日本基準ではLIFOは現在認められていません。"},
{q:"自己資本比率は自己資本を総資産で割った比率であり、一般的に高いほど財務的に安定しているとされる。",a:true,e:"自己資本比率＝自己資本（純資産）÷総資産×100。高いほど負債依存が低く財務安定性が高い。一般的に40%以上が良好とされますが業種により差があります。"},
{q:"インタレスト・カバレッジ・レシオが1倍を下回ると、利息の支払いが本業の利益でできない状態を示す。",a:true,e:"インタレスト・カバレッジ・レシオ＝（営業利益＋受取利息等）÷支払利息。1倍未満は本業の利益だけでは利息を払えない状態で財務リスクが高い。"},
{q:"総資本回転率は「売上高÷総資本」で計算され、高いほど資産が効率よく活用されていることを示す。",a:true,e:"総資本回転率（総資産回転率）は効率性指標。高いほど少ない資産で多くの売上を生み出せています。ROA＝売上高利益率×総資産回転率で分解できます。"},
{q:"保守主義の原則とは、予測される損失は早めに計上し、利益は確実に実現したものだけを計上する考え方である。",a:true,e:"保守主義の原則（安全性の原則）：不確実な利益は計上せず、予測損失は早期計上。財務諸表の健全性を保つ考え方。ただし過度な保守主義は情報の有用性を損ないます。"},
{q:"フリーキャッシュフロー（FCF）は、営業活動によるキャッシュフローから財務活動によるキャッシュフローを差し引いて算出される。",a:false,e:"FCF＝営業活動によるCF－投資活動によるCF（設備投資等）。財務CFではなく投資CFを差し引きます。FCFは企業が債権者・株主に自由に還元できるキャッシュを示します。"},
{q:"有形固定資産の取得原価には、購入代価のほか、引取運賃・据付費用などの付随費用も含まれる。",a:true,e:"取得原価主義：固定資産の取得原価＝購入代価＋付随費用（引取運賃・据付費・試運転費等）。取得するために要したコスト全体が貸借対照表に計上されます。"},
{q:"当座比率は「（現金・預金＋受取手形＋売掛金）÷流動負債×100」で計算される。",a:true,e:"当座比率は棚卸資産など換金性の低い資産を除いた「当座資産」を使う、より厳格な安全性指標。一般的に100%以上が望ましい。有価証券を加える場合もあります。"},
{q:"配当利回りは「1株あたりの年間配当金÷株価×100」で算出される指標である。",a:true,e:"配当利回り＝1株あたり年間配当金÷株価×100。配当性向（当期純利益のうち配当に回す割合）とは異なる概念。両者を区別して覚えましょう。"},
{q:"売上総利益率が同じ2社を比べた場合、販管費の比率が高い企業の方が営業利益率は高くなる。",a:false,e:"営業利益率＝（売上総利益－販管費）÷売上高。売上総利益率が同じなら、販管費の比率が高い企業ほど営業利益が少なくなり、営業利益率は低くなります。"},
{q:"社債は負債の部に計上され、株式と異なり原則として満期に元本を返済する義務がある。",a:true,e:"社債は企業が資金調達のために発行する債券で、固定負債として計上。満期日に元本返済・定期的な利息支払義務あり。株式は返済義務なしで純資産に計上されます。"},
{q:"財務諸表における「資産の流動・固定分類」において、正常営業循環基準が適用される場合、売掛金や棚卸資産は原則として流動資産に分類される。",a:true,e:"資産分類の基準：①正常営業循環基準（営業循環の中にある資産・負債は流動分類）②1年基準（ワン・イヤー・ルール：1年以内に現金化できるものは流動）。どちらかに該当すれば流動資産です。"},
{q:"ROA（総資産利益率）は「当期純利益÷総資産×100」または「営業利益÷総資産×100」で計算され、企業全体の収益性を示す指標である。",a:true,e:"ROA（Return on Assets）は投下した総資産に対して何%の利益を生み出したかを示します。ROE（自己資本利益率）とは分母が異なります。ROA＝売上高利益率×総資産回転率に分解でき、改善策を特定できます。"},
{q:"貸倒引当金とは、売掛金や貸付金などの債権が将来回収不能になることに備えて、あらかじめ費用として計上する引当金である。",a:true,e:"引当金の設定要件（企業会計原則）：①将来の費用・損失②当期以前の事象に起因③発生の可能性が高い④金額を合理的に見積もれる。貸倒引当金は期末債権残高に貸倒実績率等を乗じて設定します。"},
{q:"「純資産」は「株主資本」と同義である。",a:false,e:"純資産は「株主資本＋評価・換算差額等＋新株予約権＋非支配株主持分」で構成されます。株主資本は純資産の一部（資本金＋資本剰余金＋利益剰余金＋自己株式）です。"},
{q:"企業が借入金で設備投資をした場合、キャッシュフロー計算書では「投資活動によるキャッシュフロー」のマイナスと「財務活動によるキャッシュフロー」のプラスとして計上される。",a:true,e:"設備投資（固定資産の取得）は投資活動CF（マイナス）、借入金の調達は財務活動CF（プラス）に計上されます。これにより資金の使途（投資CF）と調達源泉（財務CF）が可視化されます。"},
{q:"「減損会計」とは、固定資産の帳簿価額が将来生み出すキャッシュフロー（回収可能価額）を上回った場合に、帳簿価額を回収可能価額まで切り下げる会計処理である。",a:true,e:"減損会計：回収可能価額＝max（正味売却価額、使用価値）。帳簿価額>回収可能価額の場合に減損損失を計上します。一度認識した減損損失は戻し入れできません（日本基準）。"},
{q:"株価収益率（PER）は「株価÷1株あたり純利益（EPS）」で計算され、数値が低いほど株価が割高であることを示す。",a:false,e:"PER（Price Earnings Ratio）は株価÷EPSで計算。数値が高いほど株価が割高（または将来成長への期待が高い）、低いほど割安といえます。成長株は高PER、バリュー株は低PERになる傾向があります。"},
{q:"「収益認識に関する会計基準」（新収益認識基準）では、収益は「履行義務の充足時（または充足につれて）」認識するという考え方が採用された。",a:true,e:"2021年4月から強制適用の収益認識基準（IFRS15号準拠）：5ステップモデル（①契約識別→②履行義務識別→③取引価格決定→④取引価格配分→⑤収益認識）で処理します。工事進行基準・サービス業など幅広い業種に影響があります。"},
{q:"負債比率（Debt-Equity Ratio）は「負債÷自己資本」で計算され、低いほど財務的に健全であることを示す。",a:true,e:"負債比率（D/Eレシオ）＝負債÷自己資本（または有利子負債÷自己資本）。低いほど負債依存が低く財務健全性が高い。自己資本比率＝1÷（1＋負債比率）の関係にあります。"},
{q:"費用収益対応の原則とは、費用と収益を適切に対応させて、その差額として利益を計算するという考え方である。",a:true,e:"費用収益対応の原則：費用は関連する収益が認識される期間に計上（期間的対応・個別的対応）。例えば製品原価は販売時に売上原価として認識。広告費など直接対応できない費用は発生時に計上します。"},
{q:"企業が研究開発費を支出した場合、日本の会計基準では原則として資産（無形固定資産）として計上する。",a:false,e:"日本の会計基準（研究開発費等に係る会計基準）では、研究開発費は発生時に全額費用（販管費または製造原価）として計上します。資産計上は認められません（IFRSでは開発段階の一定要件を満たした費用は資産計上可能）。"}
],
"運営管理":[
{q:"MRP（資材所要量計画）は、最終製品の生産計画をもとに必要な部品・資材の所要量と発注時期を計算するシステムである。",a:true,e:"MRPは①主生産計画（MPS）②部品構成表（BOM）③在庫記録の3つを基に、従属需要品目の所要量と必要時期を計算します。「後ろから逆算する」プッシュ型の生産管理手法です。"},
{q:"JITのかんばん方式では、情報が川上から川下へ流れる。",a:false,e:"かんばんは後工程が前工程に指示を出す（後補充方式）で、情報は川下から川上へ流れます。これにより過剰在庫を防ぐプル型生産方式です。"},
{q:"製品別レイアウト（ライン生産方式）は、段取り替えに要する時間が短いという特徴がある。",a:false,e:"製品別レイアウトは大量生産に適していますが、段取り替えに多くの時間がかかります。多品種少量生産に適するのは機能別レイアウト（ジョブショップ）です。"},
{q:"「時間研究」はストップウォッチ等で作業時間を計測して標準時間を設定し、「動作研究」は作業動作を分析して不要動作を排除する。",a:true,e:"作業研究（IE）の2本柱：時間研究（標準時間設定）＋動作研究（サーブリッグ分析等で動作改善）。両者を合わせて「作業研究（Industrial Engineering）」といいます。"},
{q:"ABC分析では、売上高や在庫金額の累積構成比を基に品目をA・B・Cの3ランクに分類し、Aランク品目を重点的に管理する。",a:true,e:"ABC分析はパレートの法則（80:20）を応用。少数のA品目が売上・在庫金額の大部分を占めるため重点管理。A品目は頻繁発注・厳密管理、C品目は定期一括発注などの方針を設定します。"},
{q:"生産管理において、「リードタイム」とは生産に必要な原材料費と労務費の合計を指す。",a:false,e:"リードタイムは「調達・生産・納品などの特定プロセスにかかる時間」。原材料費・労務費の合計は「製造原価（の一部）」。リードタイム短縮は在庫削減・顧客満足向上に直結します。"},
{q:"小売業において、商品回転率は「売上高÷平均在庫高（原価）」で計算され、数値が高いほど効率よく販売されていることを示す。",a:true,e:"商品回転率は在庫管理の効率性指標。高いほど少ない在庫で多くの売上を上げており効率的。回転期間（日数）＝365÷回転率で在庫が何日分あるかを把握できます。"},
{q:"HACCPは最終製品の抜き取り検査を中心とした品質管理システムである。",a:false,e:"HACCPは最終検査ではなく、製造工程の各段階で危害を予防・除去・低減する予防的管理システム。危害分析（HA）と重要管理点（CCP）を組み合わせた科学的な食品安全管理手法です。"},
{q:"坪効率（売上高÷売場坪数）は小売業の売場生産性を示す指標の一つである。",a:true,e:"坪効率は高いほど売場面積当たりの売上が多く効率的。業種・業態や立地によって適正水準は異なりますが、投資効率の評価に活用されます。"},
{q:"大日程計画は週次または日次の詳細な生産指示を行い、小日程計画は年間の生産量を決定する。",a:false,e:"逆です。大日程計画（長期）＝年間・四半期の生産量・品目決定。小日程計画（短期）＝週次・日次の具体的な生産順序・指示。階層的に策定されます。"},
{q:"物流の5大機能は、輸送・保管・荷役・包装・流通加工である。",a:true,e:"物流5大機能（情報を加えた6大機能ともいう）：①輸送②保管③荷役（積み降ろし・仕分け）④包装⑤流通加工（値付け・ラベル貼り・小分け等）。それぞれのコスト最適化が課題です。"},
{q:"管理図は上方管理限界と下方管理限界を設定し、工程が統計的管理状態にあるかを判断するために使用される。",a:true,e:"管理図（シューハート管理図）は工程データを時系列でプロットし、UCL・CL・LCLを設定。点が管理限界を外れたり特定パターンが現れると「工程異常」と判断します。"},
{q:"SCMは個々の企業が部分最適を追求するのではなく、サプライチェーン全体の全体最適を目指す経営手法である。",a:true,e:"SCM（サプライチェーン・マネジメント）は情報共有によりブルウィップ効果（需要変動の増幅）を防ぐことも重要。全体最適の実現が目的です。"},
{q:"「オープン価格」とはメーカーが推奨する希望小売価格を意味する。",a:false,e:"オープン価格はメーカーが定価を設定せず、小売業者が自由に販売価格を決める制度。メーカー希望小売価格は「建値」や「参考価格」と呼ばれます。家電製品など競争が激しい分野で多く採用されています。"},
{q:"ボトルネックとは、生産工程の中で最も処理能力が低く、全体の生産量を制約する工程のことである。",a:true,e:"TOC（制約の理論：ゴールドラット）では、ボトルネックに集中して改善することでシステム全体のスループット（成果）を向上させる手法を提唱。ボトルネック改善が最優先。"},
{q:"百貨店は委託仕入れ（消化仕入れ）を中心とし、スーパーマーケットは買取仕入れを中心とする。",a:true,e:"百貨店：在庫リスクを負わない消化仕入れが中心で派遣店員制度が特徴。スーパー：買取仕入れによる大量仕入れ・低価格販売が基本。"},
{q:"ECRSの原則は「排除・結合・交換・単純化」の順で作業改善を検討する。",a:true,e:"ECRS（イクルス）は作業改善の4原則。排除（そもそも不要では？）→結合（まとめられないか？）→交換（順序変更できないか？）→単純化（もっと簡単にできないか？）の順で検討します。"},
{q:"フランチャイズシステムにおいて、加盟店（フランチャイジー）はロイヤルティを本部（フランチャイザー）に支払う。",a:true,e:"フランチャイズは本部が①商標使用権②経営ノウハウ③開業・運営支援を提供し、加盟店がロイヤルティ（売上の一定割合等）を支払う契約形態。加盟店は独立事業者ですが本部の統一基準に従う義務があります。"},
{q:"安全在庫とは、需要の変動や調達リードタイムの不確実性に備えるために保有する余剰在庫のことである。",a:true,e:"安全在庫は欠品リスクを緩衝する緩衝在庫。安全在庫量はサービス水準と需要・リードタイムの変動幅（標準偏差）によって決まります。在庫コストとのトレードオフを管理します。"},
{q:"POSシステムでは在庫管理や発注への活用が難しい。",a:false,e:"POSシステムの活用により販売データをリアルタイム把握し、在庫管理・自動発注・売れ筋・死に筋分析・価格戦略立案などに活用できます。SCMとの連携により効率的な流通管理が実現しています。"},
{q:"「生産性」は一般的に「産出量（アウトプット）÷投入量（インプット）」で定義され、労働生産性は「生産量÷労働投入量（人数または時間）」で計算される。",a:true,e:"生産性は経営効率の基本指標。労働生産性のほかに設備生産性・資本生産性なども重要。付加価値生産性（付加価値額÷従業員数）は経営力の評価に広く使われます。"},
{q:"トヨタ生産方式の「自働化」とは、機械が異常を検知した場合に自動停止する機能を指し、「自動化」とは区別される概念である。",a:true,e:"「自働化（にんべんのついた自動化）」：機械が異常検知時に自動停止し、人が介入して問題解決する仕組み。不良品を後工程に流さない点がポイント。「自動化」（機械が自動的に動くこと）とは区別して覚えましょう。"},
{q:"品質管理のQC7つ道具のうち、「散布図」は2つの変数の関係（相関）を視覚的に表現するために使用される。",a:true,e:"QC7つ道具：パレート図・特性要因図（魚の骨図）・ヒストグラム・管理図・チェックシート・グラフ・散布図。散布図は2変数の相関関係を点で表し、正の相関・負の相関・無相関を判断します。"},
{q:"「ジャストインタイム」の観点から、生産ラインの「平準化」とは、生産量・品種を毎日均等に分散させて生産することで、需要変動への対応と在庫削減を両立する手法である。",a:true,e:"平準化生産はJITの重要要素。品目・数量を一定サイクルで均等化することで、生産の波を排除し在庫・設備・人員の無駄を削減します。「混流生産（Mixed Model Production）」とも関連します。"},
{q:"「ロット生産」とは、同種の製品を一定数まとめて生産する方式であり、まとめる数量が大きいほどセットアップ（段取り）コストを分散できる一方、在庫コストは増加する傾向がある。",a:true,e:"ロット生産のトレードオフ：ロットサイズ大↑→段取りコスト↓（1個当たり）・在庫コスト↑。最適ロットサイズ（EOQ：経済的発注量）は「段取りコスト＝在庫保管コスト」となる点で求まります。"},
{q:"「ドミナント戦略」とは、小売業において特定地域に集中して多数の店舗を出店することで、配送効率化・地域ブランド確立・競合排除などを図る出店戦略である。",a:true,e:"ドミナント戦略はコンビニ・スーパー等で広く採用。特定エリアに集中出店することで①物流コスト低減②広告効率向上③競合参入の障壁形成④ブランド認知向上などの効果があります。"},
{q:"生産管理における「プッシュ型生産」とは、後工程の需要に合わせて前工程が生産を行う方式であり、過剰在庫が発生しにくい。",a:false,e:"説明は「プル型生産（ジャストインタイム）」の特徴。プッシュ型生産は需要予測に基づき前工程から後工程へ計画的に生産を「押し込む」方式で、需要予測が外れた場合に在庫の過不足が生じやすいデメリットがあります。"},
{q:"SCMにおける「ブルウィップ効果」とは、最終消費者の需要変動が川上（サプライヤー側）に伝わるにつれて、需要の変動幅が拡大・増幅していく現象である。",a:true,e:"ブルウィップ効果（ビールゲームで有名）：小売の注文変動→卸→メーカー→部品サプライヤーと川上に行くほど需要変動が増幅します。情報共有（販売データの開示等）や需要予測の精度向上が対策です。"},
{q:"ISO9001は環境マネジメントシステムの国際規格であり、企業の環境負荷を継続的に低減することを目的としている。",a:false,e:"ISO9001は「品質マネジメントシステム」の国際規格。「環境マネジメントシステム」の国際規格はISO14001。診断士試験ではISO9001（品質）・ISO14001（環境）・ISO27001（情報セキュリティ）の区別が頻出。"},
{q:"「定期発注方式」は、在庫量が一定の発注点を下回ったタイミングで発注する方式であり、需要変動に柔軟に対応できる。",a:false,e:"「発注点（定量）発注方式」の説明。定期発注方式は一定の期間ごとに発注するもので、需要変動に応じて発注量を調整できます。重要度の高いA品目は定期発注、C品目は定量発注が多く使われます。"},
{q:"「売場効率」を高めるためのスペース・マネジメントでは、単品ごとのスペース（フェイシング数）と売上・利益を関連付けて最適な陳列を決定する。",a:true,e:"スペース・マネジメントは棚割り（プラノグラム）管理とも呼ばれます。POSデータと連携し、限られた売場スペースの生産性（スペース効率）を最大化するために品目別フェイス数・陳列位置・品揃えを最適化します。"}
],
"中小企業経営・政策":[
{q:"中小企業基本法において、製造業の中小企業は資本金3億円以下または従業員300人以下と定義されている。",a:true,e:"中小企業基本法の定義：製造業・建設業・運輸業は資本金3億円以下または従業員300人以下。卸売業1億円以下または100人以下、小売業5000万円以下または50人以下、サービス業5000万円以下または100人以下。"},
{q:"小規模企業振興基本法において、小規模企業者の従業員数は製造業で20人以下、商業・サービス業で5人以下と定義されている。",a:true,e:"小規模企業者：製造業等は従業員20人以下、商業・サービス業は5人以下。この定義は小規模企業共済法と同様。中小企業基本法上の小規模企業者も同様の定義です。"},
{q:"中小企業診断士は「中小企業基本法」に基づく国家資格であり、独占業務が法律で定められている。",a:false,e:"中小企業診断士は「中小企業支援法」に基づく国家資格。また弁護士・公認会計士と異なり独占業務は設けられていません。コンサルティング・助言が主な業務です。"},
{q:"事業承継税制（特例措置）を活用すると、後継者が非上場株式を相続・贈与により取得した際の相続税・贈与税の納税が猶予・免除される場合がある。",a:true,e:"事業承継税制の特例措置（2018〜2027年）では、一定要件を満たせば非上場株式の100%について相続税・贈与税の全額が猶予（最終的に免除される場合あり）されます。"},
{q:"クラウドファンディングは、資金の形態に関わらず常に資金提供者への元本返済義務が生じる。",a:false,e:"クラウドファンディングには購入型（返済義務なし）・寄付型（返済義務なし）・融資型（返済義務あり）・株式型（出資で返済不要）など複数の形態があります。「常に返済義務が生じる」は誤りです。"},
{q:"小規模事業者持続化補助金は、小規模事業者が販路開拓・業務効率化に取り組む際の費用を補助する制度である。",a:true,e:"小規模事業者持続化補助金は商工会議所・商工会の支援を受けて経営計画を策定し申請。補助率は2/3、通常枠の上限は50万円です（特例はより高い上限）。"},
{q:"経営改善計画策定支援事業（405事業）では、認定支援機関への費用の全額が国から補助される。",a:false,e:"405事業では認定経営革新等支援機関への費用の3分の2（上限200万円）が補助。全額ではなく、残り1/3は事業者が自己負担します。"},
{q:"中小企業活性化協議会による再生支援（私的整理）は、法的整理と比較して手続きが非公開で迅速である。",a:true,e:"私的整理（任意整理）は法的整理（民事再生・破産等）と異なり、手続きが非公開で企業の信用への影響が小さく、裁判所の関与なしに迅速に進められるメリットがあります。"},
{q:"ものづくり補助金は、中小企業が革新的な製品・サービス開発や生産プロセスの改善に取り組む際に支援される補助金である。",a:true,e:"ものづくり補助金は設備投資・システム構築・外注費等が対象。補助率は1/2（小規模事業者等は2/3）。革新的な取り組みを要件とし、申請には認定支援機関の確認が必要です。"},
{q:"経営革新計画は都道府県知事または経済産業大臣の承認を受けることで、政府系金融機関の低利融資など各種支援を受けることができる。",a:true,e:"経営革新計画は「中小企業等経営強化法」に基づき、新事業活動に取り組む中小企業が策定。承認により低利融資・信用保証の特例・販路開拓支援等が受けられます。"},
{q:"経営セーフティ共済（中小企業倒産防止共済）の掛金は損金（経費）として計上できる。",a:true,e:"経営セーフティ共済（中小機構）は取引先倒産時に無担保・無保証人で貸付を受けられる制度。掛金は全額損金算入可能（節税効果）。月5000円〜200,000円（積立限度額800万円）。"},
{q:"IT導入補助金では、ハードウェア（PC・タブレット等）の購入費用は補助対象外である。",a:false,e:"IT導入補助金のデジタル化基盤導入類型においてPC・タブレット・レジ・券売機等のハードウェアも補助対象（補助率1/2以内）に含まれます。主な対象はソフトウェアですがハードが完全対象外ではありません。"},
{q:"中小企業の財務指標について、一般に大企業と比較して自己資本比率が低い傾向がある。",a:true,e:"中小企業は大企業と比べ自己資本比率が低く借入依存度が高い傾向。内部留保の蓄積が少ないこと、株式市場へのアクセスが限られることが主な要因です。"},
{q:"下請法では、親事業者は下請代金を物品等を受領した日から起算して60日以内の定めた支払期日に支払わなければならない。",a:true,e:"下請法（下請代金支払遅延等防止法）では親事業者は受領後60日以内に支払期日を定め支払義務。違反した場合は公正取引委員会から勧告等の措置が取られます。"},
{q:"BCP（事業継続計画）とは、緊急事態発生時に重要業務を継続または早期に復旧させるための計画である。",a:true,e:"BCPは自然災害・感染症・サイバー攻撃等の緊急事態に備えた計画。中小企業のBCP策定率はまだ低い水準ですが、近年の自然災害・コロナ禍を経て策定の重要性が高まっています。"},
{q:"事業承継において、後継者への自社株式の移転は相続・贈与のほか、売買（有償譲渡）によっても行うことができる。",a:true,e:"事業承継の手法：①相続②贈与③売買（M&Aを含む）。売買の場合は先代経営者の老後資金確保というメリットがある一方、後継者の資金調達が課題となります。"},
{q:"認定支援機関には、商工会議所・商工会・税理士・公認会計士・中小企業診断士等が認定を受けることができる。",a:true,e:"認定経営革新等支援機関（中小企業支援法に基づく）には、商工会議所・商工会・金融機関・税理士・公認会計士・中小企業診断士・弁護士・コンサルタント法人等が認定を受けられます。"},
{q:"株式譲渡によるM&Aでは、売り手企業の全ての契約・許認可・従業員が原則として引き継がれる。",a:true,e:"株式譲渡は会社の法人格がそのまま存続するため、契約・許認可・雇用関係が自動的に引き継がれます（包括承継）。ただし簿外債務も引き継がれるリスクがあり、デュー・ディリジェンスが重要です。"},
{q:"小規模企業共済の掛金は全額所得控除の対象となる。",a:true,e:"小規模企業共済（中小機構）は経営者向けの退職金積立制度。月1000円〜70,000円の掛金全額が所得控除（節税効果大）。共済金受取時も退職所得・公的年金等控除の優遇があります。"},
{q:"ファクタリングは売掛債権を売却して早期に資金を得る手法であり、融資（借入）と同義である。",a:false,e:"ファクタリングは「資産の売却」であり、融資（借入）とは本質的に異なります。バランスシート上の負債は増加しません。近年、中小企業の資金繰り改善策として注目されています。"},
{q:"「中小企業強靱化法」に基づき、事業継続力強化計画を作成し経済産業大臣の認定を受けた中小企業は、低利融資等の支援措置を受けることができる。",a:true,e:"事業継続力強化計画の認定を受けた中小企業は①日本政策金融公庫の低利融資②信用保証の優遇③補助金での優遇措置等が受けられます。BCP（事業継続計画）との違いは、将来の被害想定や訓練計画が不要で策定しやすい点です。"},
{q:"中小企業の海外展開を支援するため、JETROは海外での市場調査や商談会の支援を行っているが、資金調達の支援は行っていない。",a:false,e:"JETRO（日本貿易振興機構）は市場調査・商談会支援に加え、日本貿易保険（NEXI）との連携等も行います。また、中小企業基盤整備機構（中小機構）や日本政策金融公庫も海外展開資金の融資支援を行っています。"},
{q:"「経営力向上計画」の認定を受けた中小企業は、設備取得時に即時償却または10%（中小企業者等は7%）の税額控除を選択できる。",a:true,e:"中小企業等経営強化法に基づく経営力向上計画認定→設備の即時償却（全額を一括費用計上）または取得価格の10%の税額控除が選択可能。節税・キャッシュフロー改善に有効な制度です。"},
{q:"M&AにおけるMBO（マネジメント・バイアウト）とは、外部投資家が対象企業の経営権を取得する手法である。",a:false,e:"MBOは「Management Buyout」で、対象企業の経営者（Management）が自ら自社株式を買い取って経営権を取得する手法。外部投資家が主体となるのはLBO（レバレッジド・バイアウト）です。"},
{q:"「地域経済牽引事業計画」（地方創生推進交付金の活用等）は、地域の特性を活かした高付加価値事業の創出を目指す取り組みである。",a:true,e:"地域未来投資促進法（地域経済牽引事業）では、地域の特性を生かした地域経済牽引事業計画を策定し都道府県知事に承認を受けることで、各種支援措置（税制優遇・補助金・規制緩和等）が受けられます。"},
{q:"中小企業退職金共済制度（中退共）は、従業員の退職金制度を中小企業が共同で設ける仕組みであり、掛金は全額損金（経費）算入できる。",a:true,e:"中退共（中小機構）は中小企業の従業員のための退職金共済制度。掛金は全額損金算入可能。新規加入や増額時には国からの助成もあります（加入後4ヶ月目〜1年間の掛金の1/2補助等）。"},
{q:"「中小企業のDX（デジタルトランスフォーメーション）推進」において、ITツールの導入だけではDXとはいえず、業務プロセスや組織・文化の変革を伴うことがDXの本質である。",a:true,e:"DXの定義（経済産業省）：「企業がビジネス環境の激しい変化に対応し、データとデジタル技術を活用して、顧客や社会のニーズをもとに、製品・サービス・ビジネスモデルを変革するとともに、業務そのもの・組織・プロセス・企業文化・風土を変革し、競争上の優位性を確立すること」。"},
{q:"「創業支援等措置」として、市区町村が作成する「創業支援等事業計画」に基づく支援を受けた創業者は、株式会社の設立登記にかかる登録免許税を通常の半額にできる。",a:true,e:"産業競争力強化法に基づく認定創業支援等事業計画による創業支援を受けた場合、①株式会社の設立登記に係る登録免許税を15万円→7.5万円（半額）②合同会社は6万円→3万円に軽減される措置があります。"},
{q:"「事業再生ADR（裁判外紛争解決手続）」は、過剰債務を抱えた企業が法的整理を行わず、私的交渉で金融機関等との合意による事業再生を図る手続きである。",a:true,e:"事業再生ADRは法的整理の公表による信用毀損を避けながら、認定ADR機関の仲介で金融機関と債権放棄・リスケジュール等を合意する手続き。手続きの非公開性と法的整理の強制力の中間的な位置づけです。"},
{q:"中小企業向け融資制度として、日本政策金融公庫が提供する「マル経融資（小規模事業者経営改善資金）」は、商工会・商工会議所の推薦を受けた無担保・無保証人の融資制度である。",a:true,e:"マル経融資（経営改善普及事業融資）：①商工会・商工会議所の経営指導員による指導を受けた後に推薦②無担保・無保証人③融資限度額2000万円。低金利で中小企業・小規模事業者の資金調達を支援する重要制度です。"}
],
"経営情報システム":[
{q:"ERP（統合基幹業務システム）は、財務・販売・生産・人事など企業の基幹業務を統合し、業務横断的なデータ共有とリアルタイム管理を実現する。",a:true,e:"ERP（Enterprise Resource Planning）は企業全体の経営資源を統合管理するシステム。SAP・Oracle等が代表。各業務データが一元管理され情報の整合性が保たれ、経営判断のスピードが向上します。"},
{q:"CRM（顧客関係管理）システムは、顧客情報を一元管理し、営業・マーケティング・サポートを通じて顧客との長期的な関係を構築・強化するためのシステムである。",a:true,e:"CRM（Customer Relationship Management）は顧客の基本情報・購買履歴・接触履歴などを一元管理し、顧客ロイヤルティの向上・LTV（顧客生涯価値）最大化を目指します。"},
{q:"SaaSとは、ネットワーク経由でソフトウェアをサービスとして提供する形態であり、利用者はサーバーやOSの管理を行う必要がある。",a:false,e:"SaaS（Software as a Service）はサーバー・OS・ミドルウェア・ソフトウェアすべてをクラウド事業者が管理。利用者はWebブラウザ等でソフトウェアを利用するだけで管理は不要です。"},
{q:"RFIは情報提供依頼書、RFPは提案依頼書であり、通常RFI→RFPの順で行われる。",a:true,e:"RFI（Request for Information）は市場調査目的の情報提供依頼書。RFP（Request for Proposal）は具体的な提案・見積もりを要求する提案依頼書。通常RFI→RFPの順で進めます。"},
{q:"データベースの「正規化」とは、データの重複を排除し、更新時異常を防ぐためにテーブルを適切な形に分割・整理する作業である。",a:true,e:"正規化は第1正規形→第2正規形→第3正規形の順に進め、更新異常（挿入・削除・更新時の不整合）を防ぎます。ただし過度な正規化は検索性能の低下を招く場合があります。"},
{q:"ランサムウェアとは、感染したコンピューターのデータを暗号化して使用不能にし、復号の対価として金銭を要求する不正プログラムである。",a:true,e:"ランサムウェア（Ransom＝身代金）は近年中小企業も標的になるサイバー攻撃。感染経路はメール添付・不正サイト・VPN機器の脆弱性等。バックアップ定期取得・OSアップデートが対策として重要。"},
{q:"ITガバナンスとは、IT部門が技術的問題を管理する仕組みであり、経営層は関与する必要はない。",a:false,e:"ITガバナンスは経営層が主体となってITを戦略的に活用するための統制の枠組みです。IT部門だけの問題ではなく、経営レベルでのITの方向性決定・監視・評価が含まれます（COBIT等のフレームワーク参照）。"},
{q:"アジャイル開発は要件定義・設計・実装・テストを順次一方向に進める手法である。",a:false,e:"説明はウォーターフォールモデルの特徴。アジャイル開発は短いサイクル（スプリント）を繰り返し、顧客フィードバックを取り込みながら反復的に開発を進める手法です。"},
{q:"ビッグデータの特徴「3V」とは、Volume（量）・Velocity（速度）・Variety（多様性）を指す。",a:true,e:"ビッグデータの3Vは試験頻出。Volume（大量データ量）・Velocity（リアルタイムに近い処理速度）・Variety（構造化・非構造化データの多様性）。Veracity（正確性）やValue（価値）を加えた5Vとする場合もあります。"},
{q:"ECサイトにおけるSSL/TLS通信は、クライアントとサーバー間の通信を暗号化し、第三者による盗聴・改ざんを防止する。",a:true,e:"SSL/TLSは通信を暗号化するプロトコル。URLが「https://」で始まる場合に使用。ECサイトや銀行サイトなど個人情報・クレジットカード情報を扱うサイトでは必須の技術です。"},
{q:"SLA（Service Level Agreement）とはハードウェアの平均故障間隔（MTBF）を平均修復時間（MTTR）で割って算出される指標である。",a:false,e:"SLAはサービス提供者と利用者の間で合意するサービス品質の水準を定めた契約・合意書です。設問の計算式（MTBF÷（MTBF＋MTTR））は「稼働率（Availability）」の計算式です。"},
{q:"DFD（データフロー図）は、プロセス・データフロー・データストア・外部エンティティの4要素でシステムのデータの流れを表現する。",a:true,e:"DFD（Data Flow Diagram）はシステム分析の代表的手法。プロセス（処理）・データフロー（データの流れ）・データストア（データ保存）・外部エンティティ（外部の人・組織）の4要素で構成。構造化分析の中心的ツールです。"},
{q:"過学習（オーバーフィッティング）とは、訓練データに対して精度が低すぎる状態を指す。",a:false,e:"過学習は訓練データに対して「精度が高すぎる」状態。訓練データのノイズまで学習するため、未知のデータへの汎化性能が低くなります。解決策にはデータ拡張・正則化・クロスバリデーション等があります。"},
{q:"PMBOK（Project Management Body of Knowledge）はプロジェクト管理の知識体系をまとめたもので、米国PMIが発行している。",a:true,e:"PMBOK（ピンボック）はPMI（Project Management Institute）が発行するプロジェクト管理の標準的知識体系。スコープ・スケジュール・コスト・品質・資源・コミュニケーション・リスク等の知識エリアで構成。"},
{q:"IoTは製造業のスマートファクトリーや予知保全などへの活用が進んでいる。",a:true,e:"IoTは機械・センサー・家電等がネットに繋がりデータを収集・分析・活用する技術。製造業ではリアルタイム監視・予知保全が実現。農業・医療・物流などへの応用も進んでいます。"},
{q:"情報セキュリティの「CIA」とは、機密性（Confidentiality）・完全性（Integrity）・可用性（Availability）の3要素を指す。",a:true,e:"情報セキュリティの3大要素CIAは頻出。機密性（許可された者だけがアクセス可能）・完全性（情報が正確で改ざんされていない）・可用性（必要な時に利用できる状態）の3つを確保することが基本です。"},
{q:"RPA（ロボティック・プロセス・オートメーション）は、主に非定型・高度な判断が必要な業務の自動化に適している。",a:false,e:"RPAは人間がPCで行う定型的・繰り返し作業（データ入力・転記・集計等）の自動化に適しています。非定型・高度な判断が必要な業務はRPAだけでは対応が難しく、AIとの組み合わせが必要となります。"},
{q:"プライベートIPアドレスはインターネット上でそのまま使用でき、グローバルIPアドレスは社内ネットワーク専用である。",a:false,e:"逆です。プライベートIPアドレス（192.168.x.x等）は社内LAN等の閉じたネットワーク内で使用。グローバルIPアドレスはインターネット上で使用される世界で唯一のアドレス。NATで変換してインターネット接続します。"},
{q:"ユーザー受入テスト（UAT）は、実際のエンドユーザーがシステムが業務要件を満たしているかを確認するテストである。",a:true,e:"UATは最終段階のテストで、実際のユーザーが本番に近い環境で業務要件通りに動作するかを検証。開発者が行う単体・結合・システムテストとは異なり、ユーザー視点で合否を判断します。"},
{q:"ブロックチェーン技術は改ざんが極めて困難という特性を持ち、仮想通貨以外にもサプライチェーン管理や契約管理への活用が進んでいる。",a:true,e:"ブロックチェーンは取引記録を暗号技術でブロック化し連結した分散型台帳技術。改ざん耐性・透明性・中央管理者不要が特性。スマートコントラクト・NFT・食品トレーサビリティ等幅広く応用されています。"},
{q:"クラウドコンピューティングにおける「PaaS」とは、アプリケーション開発・実行のためのプラットフォーム（OS・ミドルウェア等）をネットワーク経由で提供するサービス形態である。",a:true,e:"クラウドの3層：IaaS（インフラ：サーバー・ネットワーク）→PaaS（プラットフォーム：OS・ミドルウェア・開発環境）→SaaS（ソフトウェア：完成したアプリ）。利用者の管理責任範囲がIaaS>PaaS>SaaSの順で狭くなります。"},
{q:"「サイバー・フィジカル・システム（CPS）」とは、現実世界（フィジカル）のデータをサイバー空間で分析・シミュレーションし、その結果をフィジカル空間にフィードバックする仕組みである。",a:true,e:"CPSはIoT・AI・ビッグデータを活用してフィジカルとサイバーを融合する概念。Society 5.0（超スマート社会）の実現基盤。製造業のスマートファクトリー・自動運転・スマートシティ等に応用されています。"},
{q:"情報システムの「バッチ処理」とは、データを一定量まとめて処理する方式であり、リアルタイム処理と比較して即時性は低いが処理効率が高い。",a:true,e:"バッチ処理は一定量のデータを一括処理する方式（例：夜間の給与計算・日次売上集計）。リアルタイム処理（オンライン処理）は即時処理が可能。用途に応じて使い分けます。"},
{q:"「フィッシング（Phishing）」とは、本物そっくりの偽サイトやメールに誘導し、IDやパスワード・クレジットカード情報を詐取するサイバー攻撃である。",a:true,e:"フィッシングは金融機関・ECサイト等を装った偽メール・偽サイトで個人情報を詐取する手法。対策としてURLの確認・多要素認証（MFA）の利用・フィッシング対策訓練の実施などが有効です。"},
{q:"「UI（ユーザーインターフェース）」は人とコンピューターの接点（画面設計・操作方法）を指し、「UX（ユーザーエクスペリエンス）」はユーザーが製品・サービスを通じて得る体験全体を指す。",a:true,e:"UIはシステムの見た目・操作性（デザイン・ボタン配置等）、UXはUIを含む使用前・使用中・使用後の体験全体（利便性・感情・期待）を指します。優れたUXを実現するにはUIだけでなくサービス設計全体の改善が必要です。"},
{q:"「ウォーターフォールモデル」では、前の工程が完了してから次の工程に進むため、要件変更への対応が容易である。",a:false,e:"ウォーターフォールモデルは各工程を順番に一方向で進める手法。要件が固まっている大規模開発に向きますが、後工程での要件変更は手戻りコストが大きくなります。要件変更への柔軟対応が必要な場合はアジャイル開発が適しています。"},
{q:"「API（Application Programming Interface）」とは、異なるソフトウェアやシステム間でデータや機能を連携させるための接続仕様（インターフェース）である。",a:true,e:"APIはシステム間の「つなぎ役」。例えばECサイトが地図API・決済API・天気APIを呼び出して機能を拡張できます。オープンAPI（外部公開API）の普及によりサービス連携・エコシステム形成が進んでいます。"},
{q:"「ハッシュ関数」とは、任意の長さのデータを固定長のデータ（ハッシュ値）に変換する関数であり、同一のハッシュ値から元のデータを復元することが容易である。",a:false,e:"ハッシュ関数の重要な性質は「一方向性」（ハッシュ値から元データの復元が計算上困難）です。パスワードの保管（平文ではなくハッシュ値を保存）やデータの改ざん検知に利用されます。"},
{q:"「DX推進指標」（経済産業省）では、企業のDX成熟度を「定量指標」と「定性指標」の2つの観点から自己評価することを求めている。",a:true,e:"経済産業省の「DX推進指標」は企業がDXの現状を自己診断するためのツール。定性指標（ビジョン・戦略・ガバナンス等）と定量指標（デジタル収益比率・ITコスト比率等）の両面から評価し、ベンチマーク分析ができます。"},
{q:"「スクラム」とは、アジャイル開発の代表的なフレームワークの一つであり、プロダクトオーナー・スクラムマスター・開発チームの3つの役割と、スプリントと呼ばれる短期反復サイクルを特徴とする。",a:true,e:"スクラムはアジャイル開発の最も普及したフレームワーク。スプリント（1〜4週間の開発サイクル）を繰り返し、スプリントプランニング・デイリースクラム・スプリントレビュー・スプリントレトロスペクティブの4つのイベントで構成されます。"}
],
"経済学・経済政策":[
{q:"需要の価格弾力性が1より大きい場合、価格を引き下げると販売収入（売上高）は増加する。",a:true,e:"弾力性>1の場合、価格を1%下げると需要量が1%超増加するため総収入は増加します。弾力性<1（非弾力的）の場合は逆に総収入が減少。弾力性と総収入の関係は頻出です。"},
{q:"完全競争市場において、長期均衡では企業の経済的利潤はゼロとなる。",a:true,e:"完全競争の長期均衡：超過利潤に引き寄せられた新規参入により供給増・価格低下し、最終的にP＝最低平均費用で均衡。この状態では経済的利潤（機会費用を引いた利潤）がゼロになります。"},
{q:"日本企業が海外で生産した財は日本のGDPに含まれる。",a:false,e:"GDPは「国内（Domestic）」で生産された付加価値の合計。日本企業の海外生産は海外のGDPに含まれます。GNI（旧GNP）は「国民（National）」が生産した付加価値の合計で日本企業の海外生産を含みます。"},
{q:"インフレーションに対し、中央銀行は一般的に政策金利を引き上げることで抑制しようとする。",a:true,e:"インフレ対策として中央銀行は金利を引き上げ（金融引き締め）、借入コストを高めて消費・投資を抑制し需要を減退させます。逆にデフレ対策は金利引き下げ（金融緩和）です。"},
{q:"IS-LM分析において、財政支出の拡大はクラウディング・アウトにより、常にGDPは変化しない。",a:false,e:"完全なクラウディング・アウト（GDP不変）はLM曲線が垂直な場合（古典派的）に生じます。IS-LM分析では通常財政支出拡大でGDPは増加しますが、クラウディング・アウトにより増加幅は縮小します。"},
{q:"価格が下落すると同じ予算でより多く購入できるようになる「所得効果」は、需要曲線が右下がりである理由の一つである。",a:true,e:"需要曲線が右下がりの理由：①代替効果（相対的に安くなった財を多く購入）②所得効果（実質購買力の増加）。通常財では両効果とも需要増加方向に働きます。"},
{q:"独占企業は完全競争市場と比べて、より高い価格・より少ない生産量で利潤最大化を図る傾向がある。",a:true,e:"独占企業はMR＝MC（限界収入＝限界費用）で利潤最大化。MRがPより低いため、完全競争（P＝MC）より高価格・低産出量。この差が「独占による死荷重（厚生損失）」を生み出します。"},
{q:"日本銀行が量的緩和政策（QQE）を実施する場合、市場で国債を売却して資金量を減少させる。",a:false,e:"量的緩和（QE）は中央銀行が国債等を「買い入れ」て市場に資金を供給する政策（買いオペ）。市場から売却して資金を吸収するのは「量的引き締め」または「売りオペ」です。"},
{q:"外部経済（正の外部性）が存在する場合、市場均衡での生産量は社会的に望ましい水準よりも過少になる。",a:true,e:"正の外部性がある場合、私的便益だけを考慮する生産者は社会的便益を過小評価するため、市場均衡の生産量は社会最適水準より少なくなります。解決策として補助金（ピグー補助金）があります。"},
{q:"フィリップス曲線は、失業率とインフレ率の間に正の相関関係（失業率高→インフレ率高）があることを示している。",a:false,e:"フィリップス曲線は失業率とインフレ率の間に「負の相関」（トレードオフ）があることを示します。失業率が低い→労働需要超過→賃金・物価上昇（インフレ）という関係です。"},
{q:"財政乗数（乗数効果）の大きさは限界消費性向に依存し、限界消費性向が高いほど乗数は大きくなる。",a:true,e:"財政乗数＝1÷（1－MPC）。例えばMPC＝0.8の場合、乗数は1÷0.2＝5。政府支出1兆円がGDP5兆円増をもたらします。MPC（消費に回す割合）が高いほど乗数は大きくなります。"},
{q:"比較優位の原則によれば、全ての財の生産において絶対的に非効率な国でも、相対的に効率的な財に特化して貿易を行うことで利益を得られる。",a:true,e:"比較優位（リカード）は国際貿易の基本原理。絶対優位を持たない国でも機会費用が相対的に低い財に特化・輸出し、高い財を輸入することで両国が貿易利益を得られます。"},
{q:"市場の失敗の原因として、外部性・公共財・情報の非対称性・独占・寡占などが挙げられる。",a:true,e:"市場の失敗は市場メカニズムだけでは効率的な資源配分が達成できない状態。①外部性②公共財（非排除性・非競合性）③情報の非対称性（逆選択・モラルハザード）④独占・寡占が原因で、政府介入の根拠となります。"},
{q:"円高になると、輸出企業にとっては収益が増加し、輸入企業にとっては仕入れコストが上昇する。",a:false,e:"逆です。円高では①輸出品が割高になり輸出企業に不利②輸入品が割安になり輸入企業に有利。円安の場合は逆の効果が生じます。"},
{q:"囚人のジレンマは、各プレイヤーが個人合理的な行動（支配戦略）を選択すると、全体として非効率な結果（パレート非最適）に陥ることを示す事例である。",a:true,e:"囚人のジレンマでは両者が「裏切り」を選ぶことがナッシュ均衡ですが、両者が「協力」した場合より結果が悪くなります（パレート非最適）。企業の価格競争・軍拡競争・環境問題など幅広く応用されます。"},
{q:"供給曲線が右上がりである主な理由は、価格が上昇すると生産量を増やすインセンティブが働くからである。",a:true,e:"供給曲線が右上がりとなる理由：価格上昇により限界費用を上回る利潤が生じ追加生産が有利になること、また資源の希少性から生産量増加で限界費用が逓増するためです。"},
{q:"古典派経済学では、財政政策はクラウディング・アウトが完全に生じるためGDPへの効果はないと主張する。",a:true,e:"古典派（市場の自動調整機能を重視）：財政支出拡大が金利上昇を通じて民間投資を完全排除（完全クラウディング・アウト）するため財政政策の有効性なしと主張。ケインズ派は財政政策の有効性を主張します。"},
{q:"消費者余剰とは、消費者が財の購入に対して実際に支払った価格と、支払意思額の差額の合計である。",a:true,e:"消費者余剰（Consumer Surplus）は需要曲線と市場価格の間の面積で表されます。生産者余剰と合わせた「総余剰（社会的余剰）」が最大化される状態が効率的な資源配分です。"},
{q:"スタグフレーションとは、景気停滞とインフレーションが同時に発生する状態であり、従来のフィリップス曲線の関係では説明が困難である。",a:true,e:"スタグフレーションは1970年代の石油危機で顕在化。従来のフィリップス曲線は「失業率低下＝インフレ率上昇」のトレードオフを示すもので、「高失業率＋高インフレ」の両立はその限界を示しました。"},
{q:"リカードの等価定理によれば、合理的な消費者は将来の増税を見越して貯蓄を増やすため、国債発行による財政政策の景気刺激効果は相殺される。",a:true,e:"リカードの等価定理：国債発行による財政政策と増税による財政政策は等価。合理的な消費者は将来の増税を予想して現在の消費を変えないため（貯蓄増加）財政政策の効果が消えるとします。現実には完全には成立しない面もあります。"},
{q:"「労働需要曲線」は一般に右下がりであり、賃金が上昇すると企業の労働需要量は減少する。",a:true,e:"労働需要曲線は賃金（労働の価格）と労働需要量の関係を示す右下がりの曲線。賃金上昇→労働コスト上昇→企業は労働需要を削減（資本で代替）。最低賃金引上げの雇用への影響を考える際の基本概念です。"},
{q:"ゲーム理論の「ナッシュ均衡」とは、各プレイヤーが他のプレイヤーの戦略を所与として、自己の利得を最大化する戦略を選択した結果として達成される状態であり、その状態から一方的に戦略を変更しても利得が改善しない。",a:true,e:"ナッシュ均衡（Nash Equilibrium）：各プレイヤーが相手の戦略に対して最適応答（ベスト・レスポンス）をとっている状態。一方的な逸脱で利得が改善しないため、誰も行動を変えようとしない安定状態です。"},
{q:"「需要の所得弾力性」がマイナスの財を「下級財（劣等財）」という。",a:true,e:"需要の所得弾力性＝需要量の変化率÷所得の変化率。所得が増えると需要量が減る財（所得弾力性<0）を下級財（劣等財）といいます。通常財は所得弾力性>0。所得弾力性>1の財を「奢侈財（ぜいたく品）」といいます。"},
{q:"「マネーサプライ（通貨供給量）」の増加は、貨幣数量説の観点から物価の上昇をもたらすとされる。",a:true,e:"フィッシャーの交換方程式MV＝PT（M：貨幣量、V：流通速度、P：物価、T：取引量）で、VとTが一定なら、M増加→P上昇。貨幣数量説はインフレーションを通貨供給量の増加で説明します（ミルトン・フリードマン等）。"},
{q:"「コブ＝ダグラス型生産関数」では、資本と労働の限界生産力が逓増することが前提とされている。",a:false,e:"コブ＝ダグラス型生産関数（Y＝AK^α・L^(1-α)）では、資本の限界生産力（α-1乗に比例）は逓減します（限界生産力逓減の法則）。α＋(1-α)＝1の場合は規模に関して収穫一定が成立します。"},
{q:"「公共財」とは、非排除性（料金を支払わなくても消費できる）と非競合性（誰かが消費しても他者の消費量が減らない）の2つの性質を持つ財であり、市場では過少供給となりやすい。",a:true,e:"公共財の例：国防・灯台・一般道路・地上波テレビ放送等。非排除性があるとフリーライダー（ただ乗り）問題が生じ、市場での自発的供給が困難になります。このため政府が税収を財源として供給することが正当化されます。"},
{q:"「価格の下方硬直性」とは、需要が減少しても価格が下がりにくい現象をいい、独占的競争市場や寡占市場でよく見られる。",a:true,e:"価格の下方硬直性は不完全競争市場で見られる現象。寡占市場のキンクト（屈折）需要曲線モデルでは、一社が値下げすると他社が追随するが値上げは追随しないため、現行価格付近に硬直性が生じます。"},
{q:"「乗数効果」において、政府が「増税して、同額を政府支出に充てる均衡予算」を実施した場合、GDPの増加分は政府支出の増加分（＝増税額）と等しくなる（均衡予算乗数定理）。",a:true,e:"均衡予算乗数定理：政府支出乗数＝1÷(1-MPC)、増税乗数＝-MPC÷(1-MPC)。両者を合計すると1となり、均衡予算（ΔG＝ΔT）時のGDP変化量はΔG（＝ΔT）に等しくなります。"},
{q:"「デフレスパイラル」とは、物価下落→企業収益悪化→賃金低下→消費減少→さらなる物価下落という悪循環を指す。",a:true,e:"デフレスパイラルは物価下落が自己強化的に進む負のスパイラル。日本は1990年代後半〜2000年代にデフレを経験しました。日本銀行がインフレ目標（2%）を設定した背景です。デフレ期待の形成が長期化の要因となります。"},
{q:"「消費者物価指数（CPI）」と「GDPデフレーター」はいずれも物価を測る指標だが、GDPデフレーターは輸入品の価格も反映する一方、CPIは国内で生産された財・サービスのみを対象とする。",a:false,e:"逆です。CPI（消費者物価指数）は消費者が購入する財・サービス（輸入品含む）の価格変動を測定。GDPデフレーター（＝名目GDP÷実質GDP×100）は国内で生産された財・サービスの価格変動を測定（輸入品は除く）。"}
]
};

let pool=[],poolPointer=0,currentQ=null;
let answered=0,correct=0,wrong=0,questionCount=0;

document.querySelectorAll('.subject-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{btn.classList.toggle('selected');updateStartBtn();});
});
document.getElementById('btn-all').addEventListener('click',()=>{
  const btns=document.querySelectorAll('.subject-btn');
  const allSel=[...btns].every(b=>b.classList.contains('selected'));
  btns.forEach(b=>b.classList[allSel?'remove':'add']('selected'));
  updateStartBtn();
});
function updateStartBtn(){
  document.getElementById('start-btn').disabled=document.querySelectorAll('.subject-btn.selected').length===0;
}
document.getElementById('start-btn').addEventListener('click',()=>{
  const selected=[...document.querySelectorAll('.subject-btn.selected')].map(b=>b.dataset.subject);
  pool=[];
  selected.forEach(s=>(Q[s]||[]).forEach(q=>pool.push({...q,subject:s})));
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
  poolPointer=0;answered=0;correct=0;wrong=0;questionCount=0;
  document.getElementById('screen-subject').style.display='none';
  document.getElementById('screen-quiz').style.display='block';
  updateStats();showNextQuestion();
});
document.getElementById('back-btn').addEventListener('click',()=>{
  document.getElementById('screen-quiz').style.display='none';
  document.getElementById('screen-subject').style.display='block';
});
function showNextQuestion(){
  if(!pool.length)return;
  if(poolPointer>=pool.length)poolPointer=0;
  currentQ=pool[poolPointer++];questionCount++;
  document.getElementById('q-number').textContent=`Q.${questionCount}`;
  document.getElementById('q-subject').textContent=currentQ.subject;
  document.getElementById('q-text').textContent=currentQ.q;
  document.getElementById('explanation-box').className='explanation-box';
  document.getElementById('next-btn').className='next-btn';
  document.getElementById('btn-true').disabled=false;document.getElementById('btn-false').disabled=false;
  document.getElementById('btn-true').className='ans-btn';document.getElementById('btn-false').className='ans-btn';
  const card=document.getElementById('question-card');
  card.style.animation='none';card.offsetHeight;card.style.animation='';
}
function answer(userAnswer){
  document.getElementById('btn-true').disabled=true;document.getElementById('btn-false').disabled=true;
  const isCorrect=userAnswer===currentQ.a;
  answered++;if(isCorrect)correct++;else wrong++;
  updateStats();
  if(currentQ.a===true)document.getElementById('btn-true').className='ans-btn reveal';
  else document.getElementById('btn-false').className='ans-btn reveal';
  if(userAnswer===true)document.getElementById('btn-true').className=isCorrect?'ans-btn correct':'ans-btn wrong';
  else document.getElementById('btn-false').className=isCorrect?'ans-btn correct':'ans-btn wrong';
  const exResult=document.getElementById('ex-result');
  exResult.textContent=isCorrect?'✅ 正解！':'❌ 不正解';
  exResult.className=isCorrect?'ex-result ok':'ex-result ng';
  document.getElementById('ex-text').textContent=currentQ.e;
  document.getElementById('explanation-box').className='explanation-box show';
  document.getElementById('next-btn').className='next-btn show';
}
function nextQuestion(){showNextQuestion();}
function updateStats(){
  document.getElementById('stat-correct').textContent=correct;
  document.getElementById('stat-wrong').textContent=wrong;
  document.getElementById('score-badge').textContent=`${correct} / ${answered}`;
  document.getElementById('stat-rate').textContent=answered===0?'―':Math.round(correct/answered*100)+'%';
  document.getElementById('progress-fill').style.width=Math.min(100,answered*3)+'%';
}
</script>
</body>
</html>
